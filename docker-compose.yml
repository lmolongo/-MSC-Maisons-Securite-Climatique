version: "3.8"

services:
  # ══════ FRONTEND — Nginx serving static files ══════
  frontend:
    build: ./frontend
    container_name: msc-frontend
    restart: unless-stopped
    ports:
      - "${PORT_FRONTEND:-80}:80"
      - "${PORT_FRONTEND_SSL:-443}:443"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - msc-net

  # ══════ BACKEND — Fastify API ══════
  backend:
    build: ./backend
    container_name: msc-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - msc-net

  # ══════ POSTGRES ══════
  postgres:
    image: postgres:16-alpine
    container_name: msc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-msc}
      POSTGRES_USER: ${POSTGRES_USER:-msc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-msc}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - msc-net

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: msc-site-umami
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-msc}:${POSTGRES_PASSWORD}@postgres:5432/umami
      APP_SECRET: ${UMAMI_SECRET:-change-me}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - msc-net

volumes:
  pg_data:

networks:
  msc-net:
    driver: bridge
