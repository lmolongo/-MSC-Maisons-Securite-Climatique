version: "3.8"

services:
  # ══════ FRONTEND — Nginx serving static files ══════
  frontend:
    build: ./frontend
    container_name: msc-frontend
    restart: unless-stopped
    ports:
      - "${PORT_FRONTEND:-80}:80"
      - "${PORT_FRONTEND_SSL:-443}:443"
    depends_on:
      - backend
    networks:
      - msc-net

  # ══════ BACKEND — Fastify API ══════
  backend:
    build: ./backend
    container_name: msc-backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - msc-net

  # ══════ POSTGRES ══════
  postgres:
    image: postgres:16-alpine
    container_name: msc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-msc}
      POSTGRES_USER: ${POSTGRES_USER:-msc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-msc}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - msc-net

volumes:
  pg_data:

networks:
  msc-net:
    driver: bridge
