# ══════ HTTP — redirige vers HTTPS sauf challenge ACME ══════
server {
    listen 80;
    server_name maison-securite-bioclimatique.com www.maison-securite-bioclimatique.com;

    # Indispensable pour Let's Encrypt (renouvellement automatique aussi)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ══════ HTTPS — ton vrai site ══════
server {
    listen 443 ssl;
    http2 on;
    server_name maison-securite-bioclimatique.com www.maison-securite-bioclimatique.com;

    root /usr/share/nginx/html;
    index index.html;

    # ══════ SSL ══════
    ssl_certificate     /etc/letsencrypt/live/maison-securite-bioclimatique.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/maison-securite-bioclimatique.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ══════ SECURITY HEADERS ══════
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ══════ GZIP ══════
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ══════ STATIC ASSETS CACHING ══════
    location ~* \.(css|js|jpg|jpeg|png|gif|webp|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ══════ API PROXY ══════
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 15s;

        client_max_body_size 1m;
    }

    # ══════ HEALTH CHECK ══════
    location /health {
        proxy_pass http://backend:3000/health;
        access_log off;
    }

    # ══════ HTML PAGES ══════
    location / {
        try_files $uri $uri.html $uri/ =404;
        add_header Cache-Control "no-cache";
    }

    # ══════ CUSTOM 404 ══════
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ══════ DENY DOTFILES ══════
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}